name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BACKEND_IMAGE: placement-platform-backend
  FRONTEND_IMAGE: placement-platform-frontend

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: npm run install-all

      - name: Run tests (lint + build)
        run: npm test

  docker-build-push:
    name: Docker Build & Push to DockerHub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
            NGINX_CONF=nginx.conf
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: npm run install-all

      - name: Build production frontend
        run: npm run build --prefix frontend
        env:
          VITE_API_BASE_URL: /api

      - name: Build backend
        run: npm run build --prefix backend

      - name: Package deployment artifact
        run: |
          mkdir -p deploy-package/frontend deploy-package/backend/uploads
          cp -r frontend/dist deploy-package/frontend/
          cp -r backend/dist deploy-package/backend/
          cp backend/package.json backend/package-lock.json deploy-package/backend/
          cp aws/ec2/ecosystem.config.cjs aws/ec2/deploy-remote.sh deploy-package/
          tar -czf deploy.tar.gz -C deploy-package .

      - name: Copy package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: deploy.tar.gz
          target: /home/ubuntu/app

      - name: Write backend environment on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/ubuntu/app/backend
            {
              echo "PORT=5000"
              echo "NODE_ENV=production"
              echo "MONGODB_URI=${{ secrets.MONGODB_URI }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"
              echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}"
              echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}"
              echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}"
              echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"
            } > /home/ubuntu/app/backend/.env
            chmod 600 /home/ubuntu/app/backend/.env

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            export DEPLOY_PATH="/home/ubuntu/app"
            cd "$DEPLOY_PATH"
            tar -xzf deploy.tar.gz
            chmod +x deploy-remote.sh
            DEPLOY_PATH="$DEPLOY_PATH" ./deploy-remote.sh
            rm -f deploy.tar.gz
